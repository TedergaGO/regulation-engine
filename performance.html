<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Entra ID — Performans Olcumu</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080f;
  --s1: #0d0f1e;
  --s2: #12152b;
  --s3: #171b35;
  --border: #1e2444;
  --border2: #2a3060;
  --acc: #5b6af0;
  --acc2: #818cf8;
  --acc3: #c7d2fe;
  --text: #e2e8ff;
  --t2: #7986c4;
  --t3: #3d4a7a;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Outfit', sans-serif;

  --green: #4ade80;
  --green-bg: rgba(74,222,128,.12);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.12);
  --orange: #fb923c;
  --orange-bg: rgba(251,146,60,.12);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
.topbar::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--acc), transparent);
  opacity:.4;
}
.brand { display:flex; align-items:center; gap:12px; }
.brand-icon {
  width:32px; height:32px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  box-shadow: 0 0 20px rgba(91,106,240,0.5);
}
.brand-text { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-.3px; }
.brand-text span { color:var(--acc2); }
.topbar-meta { display:flex; align-items:center; gap:10px; }
.pill {
  font-family:var(--mono);
  font-size:10px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid var(--border2);
  color:var(--t2);
  background:var(--s2);
}
.pill.live { border-color:#22c55e44; color:#4ade80; display:flex; align-items:center; gap:5px; }
.live-pulse {
  width:6px; height:6px;
  border-radius:50%;
  background:#4ade80;
  animation: blink 1.8s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-size:10px;
  font-family:var(--mono);
  color:var(--t3);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.search-wrap { position:relative; }
.search-wrap::before {
  content:'\2315';
  position:absolute;
  left:10px; top:50%;
  transform:translateY(-50%);
  color:var(--t3);
  font-size:14px;
}
.user-search {
  width:100%;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px 10px 8px 28px;
  color:var(--text);
  font-family:var(--mono);
  font-size:11px;
  outline:none;
  transition:border-color .2s;
}
.user-search:focus { border-color:var(--acc); }
.user-search::placeholder { color:var(--t3); }
.user-list { overflow-y:auto; flex:1; padding:8px; }
.user-list::-webkit-scrollbar { width:3px; }
.user-list::-webkit-scrollbar-track { background:transparent; }
.user-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.user-item {
  display:flex; align-items:center; gap:10px;
  padding:10px; border-radius:8px; cursor:pointer;
  transition:background .15s;
  margin-bottom:2px;
  border:1px solid transparent;
}
.user-item:hover { background:var(--s2); }
.user-item.active {
  background:rgba(91,106,240,0.12);
  border-color:rgba(91,106,240,0.3);
}
.u-avatar {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0;
}
.u-info { flex:1; min-width:0; }
.u-name {
  font-size:13px; font-weight:600; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.u-dept {
  font-family:var(--mono);
  font-size:10px;
  color:var(--t3);
  margin-top:1px;
}
.u-badge {
  font-family:var(--mono);
  font-size:10px;
  padding:2px 8px;
  border-radius:3px;
  flex-shrink:0;
  font-weight:600;
}
.u-badge.score-high { background:var(--green-bg); color:var(--green); }
.u-badge.score-mid  { background:var(--yellow-bg); color:var(--yellow); }
.u-badge.score-low  { background:var(--red-bg); color:var(--red); }
.u-type-icon {
  font-size:9px; margin-right:2px; opacity:.7;
}

/* ── Score Breakdown ── */
.score-breakdown {
  margin-top:10px; display:flex; flex-direction:column; gap:4px;
}
.sb-row {
  display:flex; align-items:center; gap:6px; font-size:10px;
}
.sb-label {
  width:100px; color:var(--t2); font-family:var(--mono); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.sb-track {
  flex:1; height:6px; background:var(--s3); border-radius:3px; overflow:hidden;
}
.sb-fill {
  height:100%; border-radius:3px; transition:width .3s ease;
}
.sb-val {
  width:40px; text-align:right; color:var(--t2); font-family:var(--mono);
  font-size:9px; white-space:nowrap;
}
.kpi-score-card { grid-column: span 1; }
.kpi-type-badge {
  font-family:var(--mono); font-size:9px; padding:1px 6px;
  border-radius:3px; margin-left:6px; font-weight:600;
}
.kpi-type-badge.devops { background:rgba(0,120,215,.15); color:#60a5fa; }
.kpi-type-badge.office { background:rgba(251,146,60,.15); color:#fb923c; }

/* ── Office View ── */
.office-grid {
  display:grid; grid-template-columns:repeat(2, 1fr);
  gap:16px; padding:20px 0;
}
.office-panel {
  background:var(--s1); border:1px solid var(--border);
  border-radius:12px; padding:20px;
  animation: fadeSlideIn .3s ease both;
}
.op-title {
  font-size:13px; font-weight:700; color:var(--text);
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.op-icon { font-size:16px; }
.op-metric {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px; font-size:12px;
}
.op-metric-label { color:var(--t2); width:120px; }
.op-metric-bar {
  flex:1; height:8px; background:var(--s3);
  border-radius:4px; overflow:hidden;
}
.op-metric-fill {
  height:100%; border-radius:4px; transition:width .3s ease;
}
.op-metric-val {
  width:50px; text-align:right; font-weight:600;
  font-family:var(--mono); font-size:11px;
}
.op-stat {
  display:flex; justify-content:space-between;
  padding:6px 0; border-top:1px solid var(--border);
  font-size:11px; color:var(--t2);
}
.op-stat-val { color:var(--text); font-weight:700; }

/* ── Content ── */
.content {
  display:flex; flex-direction:column;
  overflow:hidden; background:var(--bg);
}
.content-header {
  padding:20px 28px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; background:var(--s1);
}
.selected-user { display:flex; align-items:center; gap:14px; }
.selected-avatar {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700;
}
.selected-name { font-size:18px; font-weight:700; color:var(--text); }
.selected-meta { display:flex; align-items:center; gap:8px; margin-top:2px; }
.selected-upn { font-family:var(--mono); font-size:11px; color:var(--t2); }
.selected-dept-badge {
  font-family:var(--mono); font-size:9px;
  padding:2px 8px; border-radius:3px;
  background:var(--s3); color:var(--acc2);
}
.header-stats { display:flex; gap:20px; }
.hstat { text-align:right; }
.hstat-val { font-size:22px; font-weight:800; color:var(--acc2); line-height:1; }
.hstat-label {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); margin-top:3px; letter-spacing:.5px;
}

/* ── Date filter ── */
.date-filter {
  padding:12px 28px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  flex-shrink:0; background:var(--s1);
}
.filter-label {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); text-transform:uppercase;
  letter-spacing:1px; margin-right:4px;
}
.dtab {
  font-family:var(--mono); font-size:11px;
  padding:5px 14px; border-radius:4px;
  border:1px solid var(--border);
  background:transparent; color:var(--t2);
  cursor:pointer; transition:all .15s;
}
.dtab:hover { border-color:var(--border2); color:var(--text); }
.dtab.active {
  background:var(--acc); border-color:var(--acc);
  color:white; box-shadow:0 0 14px rgba(91,106,240,.4);
}

/* ── Tab navigation ── */
.tab-nav {
  padding:0 28px;
  border-bottom:1px solid var(--border);
  display:flex; gap:0;
  flex-shrink:0; background:var(--s1);
}
.tab-btn {
  font-family:var(--sans); font-size:13px; font-weight:600;
  padding:14px 24px;
  background:transparent; border:none;
  color:var(--t2); cursor:pointer;
  position:relative; transition:color .2s;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--acc2); }
.tab-btn.active::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:var(--acc);
  border-radius:2px 2px 0 0;
  box-shadow:0 0 10px rgba(91,106,240,.4);
}

/* ── KPI cards ── */
.kpi-row {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  padding:16px 28px;
  flex-shrink:0;
}
.kpi-card {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  transition:border-color .2s;
  animation: fadeIn .3s ease forwards;
  opacity:0;
}
.kpi-card:hover { border-color:var(--border2); }
.kpi-label {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}
.kpi-value { font-size:28px; font-weight:800; color:var(--acc2); line-height:1; }
.kpi-sub {
  font-family:var(--mono); font-size:10px;
  color:var(--t2); margin-top:4px;
}
.kpi-bar {
  margin-top:10px; height:4px;
  background:var(--s3); border-radius:2px; overflow:hidden;
}
.kpi-bar-fill {
  height:100%; border-radius:2px;
  transition:width .6s ease;
}

/* ── Scrollable content area ── */
.scroll-area {
  flex:1; overflow-y:auto; padding:0;
}
.scroll-area::-webkit-scrollbar { width:4px; }
.scroll-area::-webkit-scrollbar-track { background:transparent; }
.scroll-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── Gantt chart ── */
.gantt-container { padding:20px 28px; }
.gantt-title {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:14px;
}
.gantt-header {
  display:flex; margin-bottom:8px; padding-left:90px;
}
.gantt-hour {
  flex:1; font-family:var(--mono);
  font-size:9px; color:var(--t3); text-align:center;
}
.gantt-row {
  display:flex; align-items:center; margin-bottom:6px;
  animation: fadeIn .3s ease forwards;
  opacity:0;
}
.gantt-label {
  width:80px; flex-shrink:0;
  font-family:var(--mono); font-size:11px;
  color:var(--t2); text-align:right; padding-right:10px;
}
.gantt-track {
  flex:1; height:28px;
  background:var(--s2); border-radius:4px;
  position:relative; border:1px solid var(--border);
}
.gantt-bar {
  position:absolute; top:3px; bottom:3px;
  border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:9px; color:white;
  overflow:hidden; white-space:nowrap;
  transition:opacity .2s;
  background: linear-gradient(90deg, var(--acc), var(--acc2));
}
.gantt-bar:hover { opacity:.85; }

/* ── App breakdown ── */
.app-breakdown { padding:0 28px 20px; }
.breakdown-title {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:10px;
}
.breakdown-bar {
  height:20px; display:flex;
  border-radius:4px; overflow:hidden; margin-bottom:10px;
}
.breakdown-segment { height:100%; transition:flex .3s; }
.breakdown-legend { display:flex; flex-wrap:wrap; gap:12px; }
.legend-item {
  display:flex; align-items:center; gap:5px;
  font-family:var(--mono); font-size:10px; color:var(--t2);
}
.legend-dot { width:8px; height:8px; border-radius:2px; }

/* ── DevOps grid ── */
.devops-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:20px 28px;
}
.devops-panel {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  animation: fadeIn .3s ease forwards;
  opacity:0;
}
.devops-panel:hover { border-color:var(--border2); }
.dp-title {
  font-size:12px; font-weight:600;
  color:var(--text); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.dp-icon { font-size:14px; }
.mini-chart {
  display:flex; align-items:flex-end;
  gap:4px; height:60px;
}
.mini-col {
  flex:1; display:flex;
  flex-direction:column; align-items:center;
}
.mini-bar {
  width:70%; border-radius:2px 2px 0 0;
  transition:height .4s ease;
  position:relative; cursor:default;
}
.mini-bar:hover::after {
  content:attr(data-val);
  position:absolute;
  top:-18px; left:50%; transform:translateX(-50%);
  font-family:var(--mono); font-size:9px;
  color:var(--text); background:var(--s3);
  padding:1px 6px; border-radius:2px;
  white-space:nowrap; z-index:2;
}
.mini-label {
  font-family:var(--mono); font-size:8px;
  color:var(--t3); margin-top:4px; text-align:center;
}
.dp-stat {
  margin-top:12px; padding-top:10px;
  border-top:1px solid var(--border);
  display:flex; justify-content:space-between;
  align-items:center;
}
.dp-stat-label {
  font-family:var(--mono); font-size:10px; color:var(--t2);
}
.dp-stat-val {
  font-family:var(--mono); font-size:13px;
  font-weight:600; color:var(--text);
}
.dp-stat-val.good { color:var(--green); }
.dp-stat-val.warn { color:var(--yellow); }
.dp-stat-val.bad { color:var(--red); }

/* ── PR dual bar ── */
.pr-bars { display:flex; flex-direction:column; gap:8px; }
.pr-row { display:flex; align-items:center; gap:8px; }
.pr-label {
  width:80px; font-family:var(--mono);
  font-size:10px; color:var(--t2); text-align:right;
}
.pr-track {
  flex:1; height:16px;
  background:var(--s3); border-radius:3px;
  overflow:hidden;
}
.pr-fill {
  height:100%; border-radius:3px;
  transition:width .5s ease;
  display:flex; align-items:center;
  padding-left:6px;
  font-family:var(--mono); font-size:9px; color:white;
}

/* ── Weekly chart ── */
.weekly-chart { padding:16px 28px 20px; }
.weekly-title {
  font-family:var(--mono); font-size:10px;
  color:var(--t3); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:12px;
}
.chart-bars {
  display:flex; align-items:flex-end;
  gap:8px; height:80px;
}
.chart-col {
  flex:1; display:flex;
  flex-direction:column; align-items:center; gap:4px;
}
.chart-bar-wrap {
  width:100%; height:60px;
  display:flex; align-items:flex-end; justify-content:center;
}
.chart-bar {
  width:70%; border-radius:3px 3px 0 0;
  transition:height .5s ease;
}
.chart-day {
  font-family:var(--mono); font-size:9px; color:var(--t3);
}
.chart-val {
  font-family:var(--mono); font-size:10px;
  color:var(--text); font-weight:600;
}

/* ── Summary strip ── */
.summary-strip {
  padding:12px 28px;
  border-top:1px solid var(--border);
  display:flex; gap:24px;
  flex-shrink:0; background:var(--s1);
  flex-wrap:wrap;
}
.strip-item { display:flex; align-items:center; gap:8px; }
.strip-dot { width:8px; height:8px; border-radius:50%; }
.strip-label { font-size:11px; color:var(--t2); }
.strip-val {
  font-family:var(--mono); font-size:11px;
  color:var(--text); font-weight:600;
}

/* ── Empty state ── */
.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:var(--t3); gap:12px;
}
.empty-icon { font-size:48px; opacity:.4; }
.empty-text { font-size:14px; font-weight:600; }
.empty-sub { font-family:var(--mono); font-size:11px; color:var(--t3); }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

/* ── Auth bar ── */
.auth-btn {
  font-family:var(--mono); font-size:10px;
  padding:5px 14px; border-radius:4px;
  border:1px solid var(--border2);
  background:transparent; color:var(--t2);
  cursor:pointer; transition:all .15s;
  text-decoration:none;
}
.auth-btn:hover { border-color:var(--acc); color:var(--text); }
.auth-btn.login { border-color:var(--acc); color:var(--acc2); }
.mode-pill {
  font-family:var(--mono); font-size:9px;
  padding:3px 8px; border-radius:20px;
  border:1px solid var(--border);
}
.mode-pill.demo { border-color:#fbbf2444; color:#fbbf24; }
.mode-pill.live-mode { border-color:#22c55e44; color:#4ade80; }

/* ── Loading overlay ── */
.loading-overlay {
  position:absolute; inset:0;
  background:rgba(7,8,15,.8);
  display:flex; align-items:center; justify-content:center;
  z-index:10; gap:10px;
  font-family:var(--mono); font-size:12px; color:var(--t2);
}
.spinner {
  width:18px; height:18px;
  border:2px solid var(--border2);
  border-top-color:var(--acc);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Error banner ── */
.error-banner {
  padding:8px 28px;
  background:var(--red-bg);
  border-bottom:1px solid rgba(248,113,113,.2);
  font-family:var(--mono); font-size:11px;
  color:var(--red);
  display:none; flex-shrink:0;
}

@media (max-width:1200px) {
  .layout { grid-template-columns:240px 1fr; }
  .kpi-row { grid-template-columns:1fr 1fr; }
  .devops-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">&#x2B21;</div>
    <div class="brand-text">Azure <span>Entra ID</span> &#8212; Performans &#214;l&#231;&#252;m&#252;</div>
  </div>
  <div class="topbar-meta">
    <div class="mode-pill demo" id="modePill">DEMO</div>

/* ── Seeded PRNG ── */
function seededRandom(seed) {
  let s = seed;
  // mulberry32-based PRNG for better distribution
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ── Helpers ── */
function minutesToTime(m) {
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function initials(name) {
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
}

/* ── Date helpers ── */
const DATES = ['02 Mar','03 Mar','04 Mar','05 Mar','06 Mar','07 Mar','08 Mar'];
const DATES_FULL = ['02 Mart Pzt','03 Mart Sal','04 Mart \u00C7ar','05 Mart Per','06 Mart Cum','07 Mart Cmt','08 Mart Paz'];

function isWeekend(dayIndex) {
  return dayIndex === 5 || dayIndex === 6; // Cmt, Paz
}

/* ── Data generation ── */
function generateSessionData(userId) {
  const days = [];
  for (let d = 0; d < 7; d++) {
    const rng = seededRandom(userId * 1000 + d + 42);
    const weekend = isWeekend(d);

    if (weekend && rng() > 0.25) {
      days.push({ date: DATES[d], dateFull: DATES_FULL[d], off: true, dayIndex: d });
      continue;
    }

    // First login: 07:00 - 09:30 (420-570)
    const loginMin = 420 + Math.floor(rng() * 150);
    // Last logout: 16:30 - 20:00 (990-1200)
    const logoutMin = 990 + Math.floor(rng() * 210);

    // App usage distribution
    const userApps = [];
    const pool = [...APP_NAMES];
    const appCount = 4 + Math.floor(rng() * 4);
    for (let i = 0; i < appCount && pool.length > 0; i++) {
      const idx = Math.floor(rng() * pool.length);
      userApps.push(pool.splice(idx, 1)[0]);
    }

    const appUsage = {};
    let remaining = 100;
    userApps.forEach((app, i) => {
      if (i === userApps.length - 1) {
        appUsage[app] = remaining;
      } else {
        const share = Math.floor(rng() * (remaining / 2)) + 5;
        appUsage[app] = Math.min(share, remaining);
        remaining -= appUsage[app];
      }
    });

    days.push({
      date: DATES[d],
      dateFull: DATES_FULL[d],
      dayIndex: d,
      firstLogin: minutesToTime(loginMin),
      lastLogout: minutesToTime(logoutMin),
      loginMin,
      logoutMin,
      activeMinutes: logoutMin - loginMin,
      appUsage,
      off: false
    });
  }
  return days;
}

function generateDevOpsData(userId) {
  const days = [];
  for (let d = 0; d < 7; d++) {
    const rng = seededRandom(userId * 2000 + d + 77);
    const weekend = isWeekend(d);
    const mult = weekend ? 0.2 : 1;

    const commits = weekend ? Math.floor(rng() * 3) : 1 + Math.floor(rng() * 11);
    const prsCreated = weekend ? Math.floor(rng() * 2) : Math.floor(rng() * 4);
    const prsMerged = Math.min(prsCreated, Math.floor(rng() * (prsCreated + 1)));
    const codeReviews = weekend ? Math.floor(rng() * 2) : 1 + Math.floor(rng() * 5);
    const workItemsAssigned = 3 + Math.floor(rng() * 5);
    const workItemsCompleted = Math.min(workItemsAssigned, weekend ? Math.floor(rng() * 2) : 1 + Math.floor(rng() * (workItemsAssigned - 1)));
    const buildRuns = weekend ? Math.floor(rng() * 2) : Math.floor(rng() * 5);
    const buildSuccesses = Math.min(buildRuns, Math.floor(rng() * (buildRuns + 1)));
    const linesAdded = commits > 0 ? 10 + Math.floor(rng() * 300) : 0;
    const linesRemoved = commits > 0 ? Math.floor(rng() * 150) : 0;

    days.push({
      date: DATES[d],
      dateFull: DATES_FULL[d],
      dayIndex: d,
      commits, prsCreated, prsMerged, codeReviews,
      workItemsAssigned, workItemsCompleted,
      buildRuns, buildSuccesses,
      linesAdded, linesRemoved
    });
  }
  return days;
}

function computeVariance(arr) {
  if (arr.length === 0) return 0;
  const mean = arr.reduce((s, v) => s + v, 0) / arr.length;
  return arr.reduce((s, v) => s + (v - mean) ** 2, 0) / arr.length;
}

function computePerformanceScore(userId) {
  const sessions = sessionCache[userId];
  const devops = devopsCache[userId];
  const user = USERS.find(u => String(u.id) === String(userId));
  const userType = user?.userType || 'office';

  const workDays = (sessions || []).filter(d => !d.off);
  if (workDays.length === 0) {
    return { total: 50, userType, breakdown: [] };
  }

  const breakdown = [];

  // ── Core hours definition ──
  const CORE_START = 480;  // 08:00
  const CORE_END   = 1140; // 19:00

  // ── COMMON FACTORS (40 points) ──

  // 1. Devam Tutarlılığı (0-15): varyans (12p) + mesai saatinde giriş bonusu (3p)
  const loginTimes = workDays.map(d => d.loginMin);
  const loginVar = computeVariance(loginTimes);
  let attendanceScore = Math.max(0, Math.min(12, 12 - loginVar / 100));
  // Bonus: 08:00-09:30 arası giriş yapan günler ekstra puan
  const coreLoginDays = loginTimes.filter(t => t >= CORE_START && t <= 570).length;
  attendanceScore += (coreLoginDays / workDays.length) * 3;
  attendanceScore = Math.min(15, attendanceScore);
  breakdown.push({ label: 'Devam Tutarlılığı', score: Math.round(attendanceScore * 10) / 10, max: 15 });

  // 2. Çalışma Süresi (0-15): mesai saatleri (08-19) tam ağırlık, dışı 0.3x
  const effectiveHours = workDays.map(d => {
    const start = d.loginMin;
    const end = d.logoutMin;
    // Core hours overlap
    const coreStart = Math.max(start, CORE_START);
    const coreEnd = Math.min(end, CORE_END);
    const coreMins = Math.max(0, coreEnd - coreStart);
    const offMins = (end - start) - coreMins;
    return (coreMins + offMins * 0.3) / 60;
  });
  const avgEffectiveHours = effectiveHours.reduce((s, v) => s + v, 0) / effectiveHours.length;
  const hoursScore = Math.min(15, (avgEffectiveHours / 8.5) * 15);
  breakdown.push({ label: 'Çalışma Süresi', score: Math.round(hoursScore * 10) / 10, max: 15 });

  // 3. Aktif Gün (0-10): 5 iş günü = tam puan
  const activeDayScore = Math.min(10, (workDays.length / 5) * 10);
  breakdown.push({ label: 'Aktif Gün', score: Math.round(activeDayScore * 10) / 10, max: 10 });

  const commonTotal = attendanceScore + hoursScore + activeDayScore;

  // ── ROLE-SPECIFIC FACTORS (60 points) ──
  let roleTotal = 0;

  if (userType === 'devops' && devops && devops.length > 0) {
    // DevOps: Kod Katkısı (20), PR (15), Görev (15), Build (10)
    const totalCommits = devops.reduce((s, d) => s + d.commits, 0);
    const codeScore = Math.min(20, (totalCommits / 25) * 20);
    breakdown.push({ label: 'Kod Katkısı', score: Math.round(codeScore * 10) / 10, max: 20 });

    const totalPRs = devops.reduce((s, d) => s + d.prsCreated + d.prsMerged, 0);
    const prScore = Math.min(15, (totalPRs / 5) * 15);
    breakdown.push({ label: 'PR Aktivitesi', score: Math.round(prScore * 10) / 10, max: 15 });

    const totalWI = devops.reduce((s, d) => s + d.workItemsCompleted, 0);
    const wiScore = Math.min(15, (totalWI / 15) * 15);
    breakdown.push({ label: 'Görev Tamamlama', score: Math.round(wiScore * 10) / 10, max: 15 });

    const totalBuilds = devops.reduce((s, d) => s + d.buildRuns, 0);
    const totalSuccess = devops.reduce((s, d) => s + d.buildSuccesses, 0);
    const buildScore = totalBuilds > 0 ? (totalSuccess / totalBuilds) * 10 : 7;
    breakdown.push({ label: 'Build Kalitesi', score: Math.round(buildScore * 10) / 10, max: 10 });

    roleTotal = codeScore + prScore + wiScore + buildScore;
  } else {
    // Office: İletişim (20), İşbirliği (15), Araç Çeşitliliği (15), Düzenlilik (10)
    // İletişim: Teams + Outlook sign-in oranı
    const commApps = ['Microsoft Teams', 'Outlook', 'Microsoft Outlook'];
    let commDays = 0;
    workDays.forEach(d => {
      const apps = Object.keys(d.appUsage || {});
      if (apps.some(a => commApps.includes(a))) commDays++;
    });
    const commScore = Math.min(20, (commDays / workDays.length) * 20);
    breakdown.push({ label: 'İletişim', score: Math.round(commScore * 10) / 10, max: 20 });

    // İşbirliği: SharePoint + OneDrive
    const collabApps = ['SharePoint', 'SharePoint Online', 'OneDrive'];
    let collabDays = 0;
    workDays.forEach(d => {
      const apps = Object.keys(d.appUsage || {});
      if (apps.some(a => collabApps.includes(a))) collabDays++;
    });
    const collabScore = Math.min(15, (collabDays / workDays.length) * 15);
    breakdown.push({ label: 'İşbirliği', score: Math.round(collabScore * 10) / 10, max: 15 });

    // Araç Çeşitliliği: farklı uygulama sayısı (5+ = tam puan)
    const allApps = new Set();
    workDays.forEach(d => Object.keys(d.appUsage || {}).forEach(a => allApps.add(a)));
    const toolScore = Math.min(15, (allApps.size / 5) * 15);
    breakdown.push({ label: 'Araç Çeşitliliği', score: Math.round(toolScore * 10) / 10, max: 15 });

    // Düzenlilik: günlük aktif saat tutarlılığı (düşük varyans = yüksek puan)
    const dailyHours = workDays.map(d => d.activeMinutes / 60);
    const hoursVar = computeVariance(dailyHours);
    const regScore = Math.max(0, Math.min(10, 10 - hoursVar / 3));
    breakdown.push({ label: 'Düzenlilik', score: Math.round(regScore * 10) / 10, max: 10 });

    roleTotal = commScore + collabScore + toolScore + regScore;
  }

  const total = Math.round(Math.min(100, commonTotal + roleTotal));
  return { total, userType, breakdown };
}

    const logouts = workDays.map(d => d.logoutMin);
    const avgLogin = Math.round(logins.reduce((s,v) => s+v, 0) / logins.length);
    const avgLogout = Math.round(logouts.reduce((s,v) => s+v, 0) / logouts.length);
    const avgHours = workDays.reduce((s,d) => s + d.activeMinutes, 0) / workDays.length / 60;

    document.getElementById('statFirst').textContent = minutesToTime(Math.min(...logins));
    document.getElementById('statLast').textContent = minutesToTime(Math.max(...logouts));
    document.getElementById('statHours').textContent = avgHours.toFixed(1) + 's';
    document.getElementById('statScore').textContent = scoreCache[u.id]?.total ?? '—';
  } else {
    document.getElementById('statFirst').textContent = '\u2014';
    document.getElementById('statLast').textContent = '\u2014';
    document.getElementById('statHours').textContent = '\u2014';
    document.getElementById('statScore').textContent = scoreCache[u.id]?.total ?? '—';
  }
}

/* ── Render: KPI Cards ── */
function renderKPICards() {
  const sessions = getFilteredSessions();
  const devops = getFilteredDevOps();
  const workDays = sessions.filter(d => !d.off);

  let avgLoginStr = '\u2014', avgLogoutStr = '\u2014', avgHoursStr = '\u2014', avgHoursNum = 0;
  let loginSub = '', logoutSub = '', hoursSub = '';

  if (workDays.length > 0) {
    const avgLogin = Math.round(workDays.reduce((s,d) => s+d.loginMin, 0) / workDays.length);
    const avgLogout = Math.round(workDays.reduce((s,d) => s+d.logoutMin, 0) / workDays.length);
    avgHoursNum = workDays.reduce((s,d) => s+d.activeMinutes, 0) / workDays.length / 60;

    avgLoginStr = minutesToTime(avgLogin);
    avgLogoutStr = minutesToTime(avgLogout);
    avgHoursStr = avgHoursNum.toFixed(1) + 's';

    const earliest = minutesToTime(Math.min(...workDays.map(d=>d.loginMin)));
    const latest = minutesToTime(Math.max(...workDays.map(d=>d.logoutMin)));
    loginSub = 'En erken: ' + earliest;
    logoutSub = 'En ge\u00E7: ' + latest;
    hoursSub = workDays.length + ' i\u015F g\u00FCn\u00FC';
  }

  const scoreObj = scoreCache[activeUser.id] || { total: 0, userType: 'office', breakdown: [] };
  const score = scoreObj.total;
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
  const hoursColor = avgHoursNum >= 8 ? 'var(--green)' : avgHoursNum >= 6 ? 'var(--yellow)' : 'var(--red)';
  const hoursPct = Math.min(100, (avgHoursNum / 10) * 100);

  // Skor kırılımı mini-bar'ları
  let breakdownHtml = '';
  if (scoreObj.breakdown && scoreObj.breakdown.length > 0) {
    breakdownHtml = '<div class="score-breakdown">';
    scoreObj.breakdown.forEach(b => {
      const pct = (b.score / b.max) * 100;
      const bColor = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
      breakdownHtml += `<div class="sb-row">
        <span class="sb-label">${b.label}</span>
        <div class="sb-track"><div class="sb-fill" style="width:${pct}%;background:${bColor}"></div></div>
        <span class="sb-val">${b.score}/${b.max}</span>
      </div>`;
    });
    breakdownHtml += '</div>';
  }

  const el = document.getElementById('kpiRow');
  el.innerHTML = `
    <div class="kpi-card" style="animation-delay:0ms">
      <div class="kpi-label">⏰ Ort. Giriş Saati</div>
      <div class="kpi-value">${avgLoginStr}</div>
      <div class="kpi-sub">${loginSub}</div>
    </div>
    <div class="kpi-card" style="animation-delay:60ms">
      <div class="kpi-label">🚪 Ort. Çıkış Saati</div>
      <div class="kpi-value">${avgLogoutStr}</div>
      <div class="kpi-sub">${logoutSub}</div>
    </div>
    <div class="kpi-card" style="animation-delay:120ms">
      <div class="kpi-label">⏱️ Ort. Çalışma Süresi</div>
      <div class="kpi-value">${avgHoursStr}</div>
      <div class="kpi-sub">${hoursSub}</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${hoursPct}%;background:${hoursColor}"></div></div>
    </div>
    <div class="kpi-card kpi-score-card" style="animation-delay:180ms">
      <div class="kpi-label">⭐ Verimlilik Skoru <span class="kpi-type-badge ${scoreObj.userType}">${scoreObj.userType === 'devops' ? '&lt;/&gt; DevOps' : '💼 Ofis'}</span></div>
      <div class="kpi-value" style="color:${scoreColor}">${score}</div>
      <div class="kpi-sub">100 üzerinden</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${score}%;background:${scoreColor}"></div></div>
      ${breakdownHtml}
    </div>`;
}

/* ── Tab switching ── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'session') || (i === 1 && tab === 'devops'));
  });
  document.getElementById('tabSession').style.display = tab === 'session' ? 'block' : 'none';
  document.getElementById('tabDevops').style.display = tab !== 'session' ? 'block' : 'none';
  if (activeUser) renderAll();
}

/* ── Session View ── */
function renderSessionView() {
  const sessions = getFilteredSessions();
  const workDays = sessions.filter(d => !d.off);

  let html = '<div class="gantt-container">';
  html += '<div class="gantt-title">G\u00FCnl\u00FCk Oturum Zaman \u00C7izelgesi</div>';

  // Hour labels
  html += '<div class="gantt-header">';
  for (let h = 6; h <= 22; h += 2) {
    html += `<div class="gantt-hour">${String(h).padStart(2,'0')}:00</div>`;
  }
  html += '</div>';

  const RANGE = 16 * 60; // 06:00-22:00

  if (workDays.length === 0) {
    html += '<div style="text-align:center;color:var(--t3);padding:40px;font-size:13px;">Se\u00E7ilen tarihte oturum bulunamad\u0131.</div>';
  } else {
    workDays.forEach((day, i) => {
      const loginOff = day.loginMin - 360;
      const logoutOff = day.logoutMin - 360;
      const leftPct = Math.max(0, (loginOff / RANGE) * 100);
      const widthPct = Math.max(1, ((logoutOff - loginOff) / RANGE) * 100);

      html += `
      <div class="gantt-row" style="animation-delay:${i * 40}ms">
        <div class="gantt-label">${day.date}</div>
        <div class="gantt-track">
          <div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%" title="${day.firstLogin} - ${day.lastLogout} (${(day.activeMinutes/60).toFixed(1)}s)">
            ${day.firstLogin} \u2014 ${day.lastLogout}
          </div>
        </div>
      </div>`;
    });
  }
  html += '</div>';

  // App breakdown
  if (workDays.length > 0) {
    // Aggregate app usage
    const totalUsage = {};
    workDays.forEach(day => {
      if (day.appUsage) {
        Object.entries(day.appUsage).forEach(([app, pct]) => {
          totalUsage[app] = (totalUsage[app] || 0) + pct;
        });
      }
    });
    const totalSum = Object.values(totalUsage).reduce((s,v) => s+v, 0) || 1;
    const sorted = Object.entries(totalUsage).sort((a,b) => b[1] - a[1]);

    // Category breakdown
    const catUsage = {};
    sorted.forEach(([app, val]) => {
      const meta = APP_META[app];
      const cat = meta ? meta.cat : 'Di\u011Fer';
      catUsage[cat] = (catUsage[cat] || 0) + val;
    });
    const catSorted = Object.entries(catUsage).sort((a,b) => b[1] - a[1]);
    const catColors = {};
    Object.entries(APP_CATEGORIES).forEach(([cat, v]) => { catColors[cat] = v.color; });
    catColors['Di\u011Fer'] = '#888';

    // Category bar
    html += '<div class="app-breakdown">';
    html += '<div class="breakdown-title">Kategori Baz\u0131nda Kullan\u0131m</div>';
    html += '<div class="breakdown-bar">';
    catSorted.forEach(([cat, val]) => {
      const pct = (val / totalSum * 100).toFixed(1);
      html += `<div class="breakdown-segment" style="flex:${val};background:${catColors[cat] || '#888'}" title="${cat}: %${pct}"></div>`;
    });
    html += '</div>';
    html += '<div class="breakdown-legend">';
    catSorted.forEach(([cat, val]) => {
      const pct = (val / totalSum * 100).toFixed(0);
      html += `<div class="legend-item"><div class="legend-dot" style="background:${catColors[cat] || '#888'}"></div>${cat} <span style="color:var(--text);font-weight:600">%${pct}</span></div>`;
    });
    html += '</div></div>';

    // Detailed app bar
    html += '<div class="app-breakdown" style="margin-top:16px">';
    html += '<div class="breakdown-title">Uygulama Detay\u0131</div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px">';
    sorted.forEach(([app, val]) => {
      const m = APP_META[app] || { color:'#888', cat:'Di\u011Fer' };
      const pct = (val / totalSum * 100);
      html += `<div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <div style="width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2)" title="${app}">${app}</div>
        <div style="flex:1;height:18px;background:var(--card);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${m.color};border-radius:4px;min-width:2px"></div>
        </div>
        <div style="width:40px;text-align:right;color:var(--text);font-weight:600;font-size:11px">%${pct.toFixed(0)}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  document.getElementById('tabSession').innerHTML = html;
}

    if (apps.some(a => a.includes('OneDrive'))) odDays++;

    <div class="op-title"><span class="op-icon">🤝</span>İşbirliği</div>
    <div class="op-metric">
      <span class="op-metric-label">SharePoint</span>
      <div class="op-metric-bar"><div class="op-metric-fill" style="width:${spRate}%;background:#038387"></div></div>
      <span class="op-metric-val">${spRate}%</span>
    </div>
    <div class="op-metric">
      <span class="op-metric-label">OneDrive</span>
      <div class="op-metric-bar"><div class="op-metric-fill" style="width:${odRate}%;background:#0078d4"></div></div>
      <span class="op-metric-val">${odRate}%</span>
    </div>
    <div class="op-stat">
      <span>SharePoint Gün</span><span class="op-stat-val">${spDays} / ${workDays.length}</span>
    </div>
    <div class="op-stat">
      <span>OneDrive Gün</span><span class="op-stat-val">${odDays} / ${workDays.length}</span>
    </div>
  </div>`;

  // Panel 3: Araç Çeşitliliği

  workDays.forEach(d => {

    });
  });
  const sortedApps = Object.entries(allApps).sort((a, b) => b[1] - a[1]);
  const uniqueCount = sortedApps.length;
  const diversityPct = Math.min(100, (uniqueCount / 5) * 100);

  html += `<div class="office-panel" style="animation-delay:120ms">
    <div class="op-title"><span class="op-icon">🧩</span>Araç Çeşitliliği</div>
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:28px;font-weight:800;color:${uniqueCount >= 5 ? 'var(--green)' : uniqueCount >= 3 ? 'var(--yellow)' : 'var(--red)'}">${uniqueCount}</div>
      <div style="font-size:11px;color:var(--t2)">farklı uygulama</div>
    </div>
    ${sortedApps.slice(0, 6).map(([app, count]) => {
      const m = APP_META[app] || { color:'#888' };
      const pct = Math.round(count / workDays.length * 100);
      return `<div class="op-metric">
        <span class="op-metric-label" title="${app}">${app.length > 16 ? app.slice(0,14)+'…' : app}</span>
        <div class="op-metric-bar"><div class="op-metric-fill" style="width:${pct}%;background:${m.color}"></div></div>
        <span class="op-metric-val">${count}g</span>
      </div>`;
    }).join('')}
  </div>`;

  // Panel 4: Düzenlilik
  const dailyHours = workDays.map(d => d.activeMinutes / 60);
  const avgH = dailyHours.reduce((s, v) => s + v, 0) / dailyHours.length;
  const hoursVar = computeVariance(dailyHours);
  const stdDev = Math.sqrt(hoursVar);
  const regPct = Math.max(0, Math.min(100, 100 - (stdDev / avgH) * 100));

  html += `<div class="office-panel" style="animation-delay:180ms">
    <div class="op-title"><span class="op-icon">📊</span>Oturum Düzenliliği</div>
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:28px;font-weight:800;color:${regPct >= 75 ? 'var(--green)' : regPct >= 50 ? 'var(--yellow)' : 'var(--red)'}">${Math.round(regPct)}%</div>
      <div style="font-size:11px;color:var(--t2)">tutarlılık oranı</div>
    </div>
    ${workDays.map(d => {
      const hours = d.activeMinutes / 60;
      const barPct = Math.min(100, (hours / 12) * 100);
      const color = hours >= 8 ? 'var(--green)' : hours >= 6 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="op-metric">
        <span class="op-metric-label">${d.date}</span>
        <div class="op-metric-bar"><div class="op-metric-fill" style="width:${barPct}%;background:${color}"></div></div>
        <span class="op-metric-val">${hours.toFixed(1)}s</span>
      </div>`;
    }).join('')}
    <div class="op-stat">
      <span>Ort. Çalışma</span><span class="op-stat-val">${avgH.toFixed(1)} saat</span>
    </div>
    <div class="op-stat">
      <span>Std. Sapma</span><span class="op-stat-val">±${stdDev.toFixed(1)} saat</span>
    </div>
  </div>`;

  html += '</div>';
  document.getElementById('tabDevops').innerHTML = html;
}

/* ── Weekly chart ── */
function renderWeeklyChart() {
  const el = document.getElementById('weeklyChart');

  if (activeTab === 'session') {
    const sessions = sessionCache[activeUser.id];
    const maxH = 14;
    el.innerHTML = `
      <div class="weekly-chart">
        <div class="weekly-title">Haftal\u0131k \u00C7al\u0131\u015Fma Saatleri</div>
        <div class="chart-bars">
          ${sessions.map((d, i) => {
            const hours = d.off ? 0 : d.activeMinutes / 60;
            const hPct = (hours / maxH) * 100;
            const color = d.off ? 'var(--s3)' : hours >= 8 ? 'var(--green)' : hours >= 6 ? 'var(--yellow)' : 'var(--red)';
            return `<div class="chart-col">
              <div class="chart-val">${d.off ? '-' : hours.toFixed(1)}</div>
              <div class="chart-bar-wrap"><div class="chart-bar" style="height:${Math.max(2, hPct)}%;background:${color}"></div></div>
              <div class="chart-day">${d.date.slice(0,2)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } else if (activeUser && activeUser.userType === 'office') {
    // Office: show app usage frequency chart
    const sessions = sessionCache[activeUser.id] || [];
    const workDays = sessions.filter(d => !d.off);
    const appCounts = {};
    workDays.forEach(d => Object.keys(d.appUsage || {}).forEach(a => {
      appCounts[a] = (appCounts[a] || 0) + 1;
    }));
    const sorted = Object.entries(appCounts).sort((a,b) => b[1] - a[1]).slice(0, 7);
    const maxV = sorted.length > 0 ? sorted[0][1] : 1;
    el.innerHTML = `
      <div class="weekly-chart">
        <div class="weekly-title">Haftalık Uygulama Kullanımı</div>
        <div class="chart-bars">
          ${sorted.map(([app, count]) => {
            const hPct = (count / maxV) * 100;
            const m = APP_META[app] || { color:'#888' };
            return `<div class="chart-col">
              <div class="chart-val">${count}</div>
              <div class="chart-bar-wrap"><div class="chart-bar" style="height:${Math.max(2, hPct)}%;background:${m.color}"></div></div>
              <div class="chart-day" style="font-size:8px" title="${app}">${app.slice(0,6)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } else {
    const devops = devopsCache[activeUser.id];
    const maxC = Math.max(...devops.map(d => d.commits), 1);
    el.innerHTML = `
      <div class="weekly-chart">
        <div class="weekly-title">Haftalık DevOps Aktivitesi</div>
        <div class="chart-bars">
          ${devops.map(d => {
            const hPct = (d.commits / maxC) * 100;
            return `<div class="chart-col">
              <div class="chart-val">${d.commits}</div>
              <div class="chart-bar-wrap"><div class="chart-bar" style="height:${Math.max(2, hPct)}%;background:var(--acc2)"></div></div>
              <div class="chart-day">${d.date.slice(0,2)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }
}

    const tp = devops.reduce((s,d) => s+d.prsCreated, 0);

    const tb = devops.reduce((s,d) => s+d.buildRuns, 0);

let appMode = 'demo'; // 'demo' | 'live'
let apiUsers = null;   // null = demo mode
const devopsMembers = new Set(); // emails of DevOps org members

function isDevOpsUser(user) {
  if (!user) return false;
  if (user.userType) return user.userType === 'devops';
  const email = (user.upn || '').toLowerCase();
  return devopsMembers.has(email);
}

async function loadDevOpsMembers() {
  try {
    const res = await fetch('/api/devops/members');
    if (!res.ok) throw new Error('Failed to load DevOps members');
    const members = await res.json();
    devopsMembers.clear();
    members.forEach(m => {
      if (m.email) devopsMembers.add(m.email.toLowerCase());
    });
    console.log(`[Live] DevOps members loaded: ${devopsMembers.size}`);
    // Tag existing users
    USERS.forEach(u => {
      u.userType = isDevOpsUser(u) ? 'devops' : 'office';
    });
  } catch (err) {
    console.warn('[Live] DevOps members load failed:', err.message);
    // Fallback: mark all as office
    USERS.forEach(u => { if (!u.userType) u.userType = 'office'; });
  }
}

/* ── Check auth status on load ── */
async function checkAuth() {
  try {
    const res = await fetch('/auth/status');
    if (!res.ok) return; // running without backend (file:// or python server)
    const data = await res.json();

    if (data.authenticated) {
      appMode = 'live';
      document.getElementById('modePill').textContent = 'CANLI API';
      document.getElementById('modePill').className = 'mode-pill live-mode';
      document.getElementById('authBtn').textContent = data.user.name || '\u00C7\u0131k\u0131\u015F';
      document.getElementById('authBtn').href = '/auth/logout';
      document.getElementById('authBtn').className = 'auth-btn';
      await loadLiveUsers();
    } else if (data.configured) {
      document.getElementById('modePill').textContent = 'DEMO';
      document.getElementById('modePill').className = 'mode-pill demo';
      document.getElementById('authBtn').textContent = 'Giri\u015F Yap';
      document.getElementById('authBtn').href = '/auth/login';
      document.getElementById('authBtn').className = 'auth-btn login';
    } else {
      // Not configured - stay in demo mode, hide login
      document.getElementById('authBtn').style.display = 'none';
    }
  } catch (e) {
    // No backend or CORS error - demo mode
    document.getElementById('authBtn').style.display = 'none';
  }
}

/* ── Load sign-in data for a user ── */
async function loadLiveSignIns(user) {
  try {
    const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    const to = new Date().toISOString();
    const res = await fetch(`/api/signins?upn=${encodeURIComponent(user.upn)}&from=${from}&to=${to}`);
    if (!res.ok) throw new Error('Sign-in fetch failed');
    const signins = await res.json();

    // Process sign-ins into session data format (only successful ones)
    const successSignins = signins.filter(s => s.status === 'success');
    console.log(`[Live] ${user.upn}: ${signins.length} total sign-ins, ${successSignins.length} successful`);
    const byDate = {};
    successSignins.forEach(s => {
      const dt = new Date(s.time);
      const dateKey = dt.toLocaleDateString('tr-TR', { day:'2-digit', month:'short' }).replace('.','');
      if (!byDate[dateKey]) byDate[dateKey] = { logins: [], apps: {} };
      const mins = dt.getHours() * 60 + dt.getMinutes();
      byDate[dateKey].logins.push(mins);
      byDate[dateKey].apps[s.app] = (byDate[dateKey].apps[s.app] || 0) + 1;
    });

    const days = Object.entries(byDate).map(([date, data]) => {
      const firstMin = Math.min(...data.logins);
      const lastMin = Math.max(...data.logins);
      const rawSpread = lastMin - firstMin;
      const uniqueApps = Object.keys(data.apps).length;
      const eventCount = data.logins.length;

      // Azure AD sign-in logs = auth moments, NOT continuous sessions.
      // A user signing into Azure DevOps at 09:00 works all day but only
      // generates 1-2 events. We must estimate realistic work hours.
      let estimatedActive;
      if (rawSpread >= 240) {
        // 4h+ spread: good coverage of the workday, add small buffer
        estimatedActive = rawSpread + 45;
      } else if (rawSpread >= 60) {
        // 1-4h spread: partial coverage, add larger buffer
        estimatedActive = Math.max(rawSpread + 90, uniqueApps * 120);
      } else {
        // <1h spread or single event: very sparse data
        // Estimate from activity signals: ~2h per app used, min 3h
        estimatedActive = Math.max(uniqueApps * 120, eventCount * 90, 180);
      }
      // Reasonable bounds: 1h - 12h
      estimatedActive = Math.max(60, Math.min(estimatedActive, 12 * 60));

      // Adjust logoutMin so timeline display is consistent
      const logoutMin = Math.min(firstMin + estimatedActive, 22 * 60);
      const loginMin = firstMin;
      const activeMinutes = logoutMin - loginMin;

      console.log(`[Live] ${date}: ${eventCount} events, ${uniqueApps} apps, spread=${rawSpread}m → estimated=${activeMinutes}m (${(activeMinutes/60).toFixed(1)}h)`);

      const totalApps = Object.values(data.apps).reduce((s,v) => s+v, 0) || 1;
      const appUsage = {};
      Object.entries(data.apps).forEach(([app, count]) => {
        appUsage[app] = Math.round(count / totalApps * 100);
      });
      return {
        date,
        dateFull: date,
        dayIndex: 0,
        firstLogin: minutesToTime(loginMin),
        lastLogout: minutesToTime(logoutMin),
        loginMin, logoutMin,
        activeMinutes,
        appUsage,
        off: false,
      };
    });

    sessionCache[user.id] = days.length > 0 ? days : [{ date: 'Bug\u00FCn', off: true, dayIndex: 0 }];
  } catch (err) {
    showError('Oturum verileri y\u00FCklenemedi: ' + err.message);
    // Fallback to empty
    sessionCache[user.id] = [{ date: '-', off: true, dayIndex: 0 }];
  }
}

/* ── Load DevOps data for a user ── */
async function loadLiveDevOps(user) {
  try {
    // Load repos first
    const reposRes = await fetch('/api/devops/repos');
    const repos = reposRes.ok ? await reposRes.json() : [];

    // Load commits from all repos
    const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    const to = new Date().toISOString();
    let allCommits = [];
    for (const repo of repos.slice(0, 5)) { // limit to 5 repos
      try {
        const cRes = await fetch(`/api/devops/commits?repoId=${repo.id}&author=${encodeURIComponent(user.upn)}&from=${from}&to=${to}`);
        if (cRes.ok) {
          const commits = await cRes.json();
          allCommits = allCommits.concat(commits);
        }
      } catch (_) {}
    }

    // Load PRs
    const prRes = await fetch('/api/devops/pullrequests?status=all');
    const allPRs = prRes.ok ? await prRes.json() : [];
    const userPRs = allPRs.filter(pr =>
      pr.createdByEmail?.toLowerCase() === user.upn.toLowerCase()
    );

    // Load work items
    const wiRes = await fetch(`/api/devops/workitems?assignedTo=${encodeURIComponent(user.upn)}&from=${from.split('T')[0]}`);
    const workItems = wiRes.ok ? await wiRes.json() : [];

    // Load builds
    const buildRes = await fetch(`/api/devops/builds?requestedFor=${encodeURIComponent(user.upn)}&from=${from}&to=${to}`);
    const builds = buildRes.ok ? await buildRes.json() : [];

    // Group by date
    const byDate = {};
    for (let i = 0; i < 7; i++) {
      const d = new Date(Date.now() - (6 - i) * 24 * 60 * 60 * 1000);
      const key = d.toISOString().split('T')[0];
      const label = d.toLocaleDateString('tr-TR', { day:'2-digit', month:'short' }).replace('.','');
      byDate[key] = { date: label, dayIndex: i, commits:0, prsCreated:0, prsMerged:0, codeReviews:0,
        workItemsAssigned:0, workItemsCompleted:0, buildRuns:0, buildSuccesses:0, linesAdded:0, linesRemoved:0 };
    }

    allCommits.forEach(c => {
      const key = c.date?.split('T')[0];
      if (byDate[key]) {
        byDate[key].commits++;
        byDate[key].linesAdded += (c.changeCounts?.Add || 0);
        byDate[key].linesRemoved += (c.changeCounts?.Delete || 0);
      }
    });

    userPRs.forEach(pr => {
      const key = pr.creationDate?.split('T')[0];
      if (byDate[key]) {
        byDate[key].prsCreated++;
        if (pr.status === 'completed') byDate[key].prsMerged++;
      }
    });

    workItems.forEach(wi => {
      const key = wi.changedDate?.split('T')[0];
      if (byDate[key]) {
        byDate[key].workItemsAssigned++;
        if (wi.state === 'Done' || wi.state === 'Closed') byDate[key].workItemsCompleted++;
      }
    });

    builds.forEach(b => {
      const key = b.startTime?.split('T')[0];
      if (byDate[key]) {
        byDate[key].buildRuns++;
        if (b.result === 'succeeded') byDate[key].buildSuccesses++;
      }
    });

    devopsCache[user.id] = Object.values(byDate);
  } catch (err) {
    showError('DevOps verileri y\u00FCklenemedi: ' + err.message);
    devopsCache[user.id] = DATES.map((d, i) => ({
      date: d, dayIndex: i, commits:0, prsCreated:0, prsMerged:0, codeReviews:0,
      workItemsAssigned:0, workItemsCompleted:0, buildRuns:0, buildSuccesses:0, linesAdded:0, linesRemoved:0
    }));
  }
}

/* ── Override selectUser for live mode ── */
const _originalSelectUser = selectUser;
selectUser = async function(id) {
  if (appMode === 'demo') {
    return _originalSelectUser(id);
  }

  // Live mode: load data from API
  activeUser = USERS.find(u => String(u.id) === String(id));
  if (!activeUser) return;

  activeDate = 'T\u00FCm\u00FC';
  renderUsers(document.getElementById('userSearch').value);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';

  // Show loading overlay
  let loadingEl = document.getElementById('liveLoading');
  if (!loadingEl) {
    loadingEl = document.createElement('div');
    loadingEl.id = 'liveLoading';
    loadingEl.style.cssText = 'position:fixed;top:0;left:280px;right:0;bottom:0;background:rgba(7,8,15,.85);display:flex;align-items:center;justify-content:center;z-index:999;gap:12px;color:#8b8fa3;font-size:15px;';
    loadingEl.innerHTML = '<div class="spinner"></div>Y\u00FCkleniyor...';
    document.body.appendChild(loadingEl);
  }
  loadingEl.style.display = 'flex';

  try {
    // Load data in parallel (skip DevOps for office users)
    const loadTasks = [
      sessionCache[id] ? Promise.resolve() : loadLiveSignIns(activeUser),
    ];
    if (isDevOpsUser(activeUser)) {
      loadTasks.push(devopsCache[id] ? Promise.resolve() : loadLiveDevOps(activeUser));
    }
    await Promise.all(loadTasks);
  } catch (err) {
    console.error('Data load error:', err);
  }

  // Hide loading
  loadingEl.style.display = 'none';

  // Ensure caches have fallback data
  if (!sessionCache[id]) sessionCache[id] = [{ date: '-', off: true, dayIndex: 0 }];
  if (!devopsCache[id]) devopsCache[id] = DATES.map((d, i) => ({
    date: d, dayIndex: i, commits:0, prsCreated:0, prsMerged:0, codeReviews:0,
    workItemsAssigned:0, workItemsCompleted:0, buildRuns:0, buildSuccesses:0, linesAdded:0, linesRemoved:0
  }));

  // Compute score
  if (!scoreCache[id]) {
    scoreCache[id] = computePerformanceScore(id);
  }

  renderDateFilter();
  renderAll();
};

  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 8000);
}
